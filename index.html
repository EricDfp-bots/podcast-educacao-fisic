<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROF: Podcast Educação Física</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #0a0a0a, #1a1a1a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.player {
    width: 90%;
    max-width: 360px;
    background: #121212;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 30px rgba(255,0,0,0.3);
    text-align: center;
}

.capa-container {
    position: relative;
}

.capa {
    width: 100%;
    border-radius: 15px;
}

.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,0,0,0.9);
    border: none;
    border-radius: 50%;
    width: 70px;
    height: 70px;
    color: white;
    font-size: 30px;
    cursor: pointer;
}

.play-btn:hover {
    background: red;
}

h1 {
    font-size: 18px;
    margin: 15px 0 5px;
}

.prof {
    font-size: 13px;
    color: #bbb;
}

audio {
    display: none;
}

.controls {
    margin-top: 15px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    margin: 5px;
    cursor: pointer;
}

.download {
    background: #ff0000;
    color: white;
}

.share {
    background: #25D366;
    color: white;
}

.footer {
    margin-top: 10px;
    font-size: 11px;
    color: #666;
}
</style>

</head>

<body>

<div class="player">

<div class="capa-container">
    <img src="capa.jpg" class="capa">
    <button class="play-btn" onclick="toggleAudio()">▶</button>
</div>

<h1>PROF: PODCAST EDUCAÇÃO FÍSICA</h1>
<p class="prof">Profª: SEU NOME AQUI</p>

<audio id="audio">
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<div class="controls">
    <button class="download" onclick="downloadAudio()">⬇️ Baixar</button>
    <button class="share" onclick="share()">📲 Compartilhar</button>
</div>

<div class="footer">
Ouça e compartilhe com seus alunos 🎧
</div>

</div>

<script>
let audio = document.getElementById("audio");
let btn = document.querySelector(".play-btn");

function toggleAudio() {
    if (audio.paused) {
        audio.play();
        btn.innerHTML = "⏸";
    } else {
        audio.pause();
        btn.innerHTML = "▶";
    }
}

function downloadAudio() {
    window.location.href = "audio.mp3";
}

function share() {
    let url = window.location.href;
    window.open("https://wa.me/?text=Ouça este podcast: " + url);
}
</script>

</body>
</html>
