<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROF: Podcast Educação Física</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #0a0a0a, #1a1a1a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.player {
    width: 90%;
    max-width: 360px;
    background: #121212;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 40px rgba(255,0,0,0.4);
    text-align: center;
}

.capa-container {
    position: relative;
}

.capa {
    width: 100%;
    border-radius: 15px;
}

.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,0,0,0.9);
    border: none;
    border-radius: 50%;
    width: 75px;
    height: 75px;
    color: white;
    font-size: 30px;
    cursor: pointer;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
    70% { box-shadow: 0 0 0 20px rgba(255,0,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
}

h1 {
    font-size: 18px;
    margin: 15px 0;
}

audio {
    display: none;
}

.progress-container {
    width: 100%;
    height: 6px;
    background: #333;
    border-radius: 10px;
    margin-top: 15px;
    cursor: pointer;
}

.progress {
    height: 100%;
    background: red;
    width: 0%;
    border-radius: 10px;
}

.time {
    font-size: 12px;
    margin-top: 5px;
    color: #bbb;
}

.controls {
    margin-top: 15px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    margin: 5px;
    cursor: pointer;
}

.download {
    background: #ff0000;
    color: white;
}

.share {
    background: #25D366;
    color: white;
}

.footer {
    margin-top: 10px;
    font-size: 11px;
    color: #666;
}
</style>

</head>

<body>

<div class="player">

<div class="capa-container">
    <img src="capa.jpg" class="capa">
    <button class="play-btn" onclick="toggleAudio()">▶</button>
</div>

<h1>PROF: PODCAST EDUCAÇÃO FÍSICA</h1>

<audio id="audio">
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<div class="progress-container" onclick="setProgress(event)">
    <div class="progress" id="progress"></div>
</div>

<div class="time" id="time">0:00 / 0:00</div>

<div class="controls">
    <button class="download" onclick="downloadAudio()">⬇️ Baixar</button>
    <button class="share" onclick="share()">📲 Compartilhar</button>
</div>

<div class="footer">
Ouça e compartilhe 🎧
</div>

</div>

<script>
let audio = document.getElementById("audio");
let btn = document.querySelector(".play-btn");
let progress = document.getElementById("progress");
let time = document.getElementById("time");

function toggleAudio() {
    if (audio.paused) {
        audio.play();
        btn.innerHTML = "⏸";
    } else {
        audio.pause();
        btn.innerHTML = "▶";
    }
}

audio.addEventListener("timeupdate", () => {
    let percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + "%";

    let current = formatTime(audio.currentTime);
    let duration = formatTime(audio.duration);
    time.innerHTML = current + " / " + duration;
});

function setProgress(e) {
    let width = e.currentTarget.clientWidth;
    let clickX = e.offsetX;
    audio.currentTime = (clickX / width) * audio.duration;
}

function formatTime(sec) {
    if (!sec) return "0:00";
    let m = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return m + ":" + (s < 10 ? "0" + s : s);
}

function downloadAudio() {
    window.location.href = "audio.mp3";
}

function share() {
    let url = window.location.href;
    window.open("https://wa.me/?text=Ouça este podcast: " + url);
}
</script>

</body>
</html>
