<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROF: Podcast Educação Física</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #0a0a0a, #1a1a1a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.player {
    width: 90%;
    max-width: 350px;
    background: #121212;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 30px rgba(255,0,0,0.3);
    text-align: center;
}

.capa {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
}

h1 {
    font-size: 18px;
    margin: 10px 0;
}

p {
    font-size: 13px;
    color: #bbb;
}

audio {
    width: 100%;
    margin-top: 15px;
}

.btn-download {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 15px;
    background: #ff0000;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 14px;
}

.btn-download:hover {
    background: #cc0000;
}

.footer {
    margin-top: 15px;
    font-size: 11px;
    color: #666;
}
</style>

</head>

<body>

<div class="player">

<img src="capa.jpg" class="capa">

<h1>PROF: PODCAST EDUCAÇÃO FÍSICA</h1>

<p>Conteúdo educativo para estudos 📚</p>

<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<a href="audio.mp3" class="btn-download" download>⬇️ Baixar áudio</a>

<div class="footer">
Compartilhe com seus alunos 🎧
</div>

</div>

</body>
</html>
